name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: .go-version
          cache: true

      - name: Download dependencies
        run: CGO_ENABLED=0 go mod download

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Test
        run: CGO_ENABLED=0 go test ./... -cover -coverprofile=coverage.out

      - name: Coverage check
        run: |
          go tool cover -func=coverage.out | grep total | awk '{if ($3+0 < 80) {print "Coverage below 80%: " $3; exit 1}}'

      - name: Build
        run: CGO_ENABLED=0 go build -o task .

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: .go-version

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          CGO_ENABLED=0 go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o task-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: task-*
